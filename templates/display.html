<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kundenstopper</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #ffffff;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        #content-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #content-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: block;
        }

        #content-container video {
            width: 100vw;
            height: 100vh;
            object-fit: contain; /* overridden dynamically via JS */
        }

        #content-container iframe {
            width: 100vw;
            height: 100vh;
            border: none;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #888;
            font-size: 20px;
            text-align: center;
        }

        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            border-top: 4px solid #888;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #error {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff6b6b;
            font-size: 18px;
            text-align: center;
            display: none;
            max-width: 80%;
        }

        #countdown {
            position: fixed;
            bottom: 15px;
            right: 15px;
            font-size: 14px;
            color: rgba(80, 80, 80, 0.7);
            font-weight: 300;
            display: none;
            user-select: none;
        }

        #progress-container {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            display: none;
            background: rgba(0, 0, 0, 0.05);
            padding: 8px 15px;
            box-sizing: border-box;
        }

        #progress-wrapper {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        #progress-bar-bg {
            flex: 1;
            height: 4px;
            background: rgba(200, 200, 200, 0.3);
            border-radius: 2px;
            overflow: hidden;
        }

        #progress-bar-fill {
            height: 100%;
            background: rgba(100, 100, 100, 0.5);
            width: 100%;
            transform: scaleX(0);
            transform-origin: left center;
            transition: transform 1s linear;
            border-radius: 2px;
        }

        #page-indicator {
            font-size: 12px;
            color: rgba(100, 100, 100, 0.7);
            font-weight: 400;
            white-space: nowrap;
        }

        /* Subtle: flush 2px bar, no background track, no text */
        #progress-container.subtle {
            background: transparent;
            padding: 0;
        }
        #progress-container.subtle #progress-bar-bg {
            height: 2px;
            background: rgba(150, 150, 150, 0.2);
            border-radius: 0;
        }
        #progress-container.subtle #progress-bar-fill {
            background: rgba(80, 80, 80, 0.55);
            border-radius: 0;
        }
        #progress-container.subtle #page-indicator { display: none; }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        Wird geladen...
    </div>
    <div id="error"></div>
    <div id="countdown"></div>
    <div id="progress-container">
        <div id="progress-wrapper">
            <div id="progress-bar-bg">
                <div id="progress-bar-fill"></div>
            </div>
            <span id="page-indicator"></span>
        </div>
    </div>
    <div id="content-container"></div>

    <script>
        const DISPLAY_SLUG = {{ slug | tojson }};
        const API_URL = '/api/display/' + DISPLAY_SLUG;

        const container = document.getElementById('content-container');
        const loadingDiv = document.getElementById('loading');
        const errorDiv = document.getElementById('error');
        const countdownDiv = document.getElementById('countdown');
        const progressContainer = document.getElementById('progress-container');
        const progressBarFill = document.getElementById('progress-bar-fill');
        const pageIndicator = document.getElementById('page-indicator');

        // --- State ---
        var slides = [];           // flat array of slide objects (see buildSlides)
        var slideIndex = 0;
        var slideTimer = null;     // setTimeout for advancing to next slide
        var countdownTimer = null; // setInterval for progress display
        var elapsedSeconds = 0;
        var countdownSeconds = 0;
        var currentSlideDuration = 0;
        var progressIndicator = 'progress';
        var currentStateKey = null;

        // A slide: { type, url, duration, video_fit, scale_to_fit }
        // duration = seconds (Infinity = show until content changes, e.g. single non-PDF item)

        function buildSlides(data) {
            if (data.mode === 'playlist') {
                var result = [];
                (data.items || []).forEach(function(item) {
                    var dur = Math.max(1, item.duration || 10);
                    if (item.content_type === 'pdf' || item.content_type === 'gallery') {
                        var pages = item.pages || [];
                        if (!pages.length) return;
                        var timePerPage = Math.max(1, Math.floor(dur / pages.length));
                        var slideType = item.content_type === 'pdf' ? 'pdf-page' : 'image';
                        pages.forEach(function(url) {
                            result.push({ type: slideType, url: url, duration: timePerPage });
                        });
                    } else {
                        result.push({
                            type: item.content_type, url: item.url, duration: dur,
                            video_fit: item.video_fit || 'contain',
                            scale_to_fit: item.scale_to_fit || false,
                        });
                    }
                });
                return result;
            }
            // Single-item mode
            var ct = data.content_type;
            var interval = data.cycle_interval || 10;
            if (ct === 'pdf' || ct === 'gallery') {
                var slideType = ct === 'pdf' ? 'pdf-page' : 'image';
                return (data.pages || []).map(function(url) {
                    return { type: slideType, url: url, duration: interval };
                });
            }
            return [{ type: ct, url: data.url, duration: Infinity,
                      video_fit: data.video_fit || 'contain',
                      scale_to_fit: data.scale_to_fit || false }];
        }

        function getStateKey(data) {
            if (data.mode === 'playlist') {
                return 'playlist:' + (data.items || []).map(function(i) {
                    return (i.content_type || '') + ':' + (i.url || (i.pages && i.pages[0]) || '') + ':' + i.duration;
                }).join('|');
            }
            if (data.content_type === 'pdf' || data.content_type === 'gallery')
                return data.content_type + ':' + data.cycle_interval + ':' + ((data.pages && data.pages[0]) || '');
            return (data.content_type || '') + ':' + (data.url || '');
        }

        // --- Rendering ---

        function showError(msg) {
            loadingDiv.style.display = 'none';
            errorDiv.textContent = msg;
            errorDiv.style.display = 'block';
        }

        function renderSlide(slide) {
            container.innerHTML = '';
            errorDiv.style.display = 'none';
            loadingDiv.style.display = 'block';

            if (slide.type === 'pdf-page' || slide.type === 'image') {
                var img = document.createElement('img');
                img.src = slide.url;
                img.onload = function() { loadingDiv.style.display = 'none'; };
                img.onerror = function() { showError('Bild konnte nicht geladen werden'); };
                container.appendChild(img);

            } else if (slide.type === 'video') {
                var video = document.createElement('video');
                video.src = slide.url;
                video.autoplay = true; video.loop = true; video.muted = true; video.playsInline = true;
                video.style.objectFit = slide.video_fit || 'contain';
                video.oncanplay = function() { loadingDiv.style.display = 'none'; };
                video.onerror = function() { showError('Video konnte nicht geladen werden'); };
                container.appendChild(video);

            } else if (slide.type === 'youtube') {
                var iframe = document.createElement('iframe');
                iframe.src = slide.url;
                iframe.allow = 'autoplay; fullscreen';
                iframe.onload = function() { loadingDiv.style.display = 'none'; };
                container.appendChild(iframe);

            } else if (slide.type === 'url') {
                var iframe = document.createElement('iframe');
                var src = '/proxy?url=' + encodeURIComponent(slide.url);
                if (slide.scale_to_fit) src += '&scale=fit';
                iframe.src = src;
                iframe.allow = 'autoplay; fullscreen';
                iframe.onload = function() { loadingDiv.style.display = 'none'; };
                container.appendChild(iframe);
            }
        }

        // --- Progress indicator ---

        function updateProgress() {
            var total = slides.length;
            var finite = isFinite(currentSlideDuration);
            progressContainer.classList.remove('subtle');

            if (total <= 1 || !finite) {
                countdownDiv.style.display = 'none';
                progressContainer.style.display = 'none';
                return;
            }
            if (progressIndicator === 'countdown') {
                countdownDiv.textContent = countdownSeconds + 's';
                countdownDiv.style.display = 'block';
                progressContainer.style.display = 'none';
            } else if (progressIndicator === 'progress' || progressIndicator === 'subtle') {
                if (progressIndicator === 'subtle') progressContainer.classList.add('subtle');
                if (progressIndicator === 'progress') pageIndicator.textContent = (slideIndex + 1) + ' / ' + total;
                progressBarFill.style.transform = 'scaleX(' + (elapsedSeconds / currentSlideDuration) + ')';
                countdownDiv.style.display = 'none';
                progressContainer.style.display = 'block';
            } else {
                countdownDiv.style.display = 'none';
                progressContainer.style.display = 'none';
            }
        }

        // --- Slide cycling ---

        function stopAll() {
            if (slideTimer)    { clearTimeout(slideTimer);  slideTimer = null; }
            if (countdownTimer){ clearInterval(countdownTimer); countdownTimer = null; }
            countdownDiv.style.display = 'none';
            progressContainer.style.display = 'none';
        }

        function startSlide(index) {
            stopAll();
            if (!slides.length) return;
            slideIndex = index % slides.length;
            var slide = slides[slideIndex];
            renderSlide(slide);
            if (slides.length <= 1 || !isFinite(slide.duration)) return;

            currentSlideDuration = slide.duration;
            countdownSeconds = slide.duration;
            elapsedSeconds = 0;
            updateProgress();
            countdownTimer = setInterval(function() {
                countdownSeconds = Math.max(0, countdownSeconds - 1);
                elapsedSeconds++;
                updateProgress();
            }, 1000);
            slideTimer = setTimeout(function() {
                startSlide((slideIndex + 1) % slides.length);
            }, slide.duration * 1000);
        }

        // --- Polling ---

        function poll() {
            fetch(API_URL)
                .then(function(r) {
                    if (!r.ok) throw new Error();
                    return r.json();
                })
                .then(function(data) {
                    document.body.style.backgroundColor = data.background_color || '#ffffff';
                    var newIndicator = data.progress_indicator || 'progress';
                    var newKey = getStateKey(data);

                    if (newKey !== currentStateKey) {
                        currentStateKey = newKey;
                        progressIndicator = newIndicator;
                        var newSlides = buildSlides(data);
                        if (!newSlides.length) { showError('Kein Inhalt verfügbar'); return; }
                        slides = newSlides;
                        startSlide(0);
                    } else if (newIndicator !== progressIndicator) {
                        progressIndicator = newIndicator;
                        updateProgress();
                    }
                })
                .catch(function() { showError('Kein Inhalt verfügbar'); });
        }

        poll();
        setInterval(poll, 10000);
    </script>
</body>
</html>
