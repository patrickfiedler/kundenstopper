<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kundenstopper</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #ffffff;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        #content-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #content-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: block;
        }

        #content-container video {
            width: 100vw;
            height: 100vh;
            object-fit: contain; /* overridden dynamically via JS */
        }

        #content-container iframe {
            width: 100vw;
            height: 100vh;
            border: none;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #888;
            font-size: 20px;
            text-align: center;
        }

        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            border-top: 4px solid #888;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #error {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff6b6b;
            font-size: 18px;
            text-align: center;
            display: none;
            max-width: 80%;
        }

        #countdown {
            position: fixed;
            bottom: 15px;
            right: 15px;
            font-size: 14px;
            color: rgba(128, 128, 128, 0.5);
            font-weight: 300;
            display: none;
            user-select: none;
        }

        #progress-container {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            display: none;
            background: rgba(0, 0, 0, 0.05);
            padding: 8px 15px;
            box-sizing: border-box;
        }

        #progress-wrapper {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        #progress-bar-bg {
            flex: 1;
            height: 4px;
            background: rgba(200, 200, 200, 0.3);
            border-radius: 2px;
            overflow: hidden;
        }

        #progress-bar-fill {
            height: 100%;
            background: rgba(100, 100, 100, 0.5);
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 2px;
        }

        #page-indicator {
            font-size: 12px;
            color: rgba(100, 100, 100, 0.7);
            font-weight: 400;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        Wird geladen...
    </div>
    <div id="error"></div>
    <div id="countdown"></div>
    <div id="progress-container">
        <div id="progress-wrapper">
            <div id="progress-bar-bg">
                <div id="progress-bar-fill"></div>
            </div>
            <span id="page-indicator"></span>
        </div>
    </div>
    <div id="content-container"></div>

    <script>
        const DISPLAY_SLUG = {{ slug | tojson }};
        const API_URL = '/api/display/' + DISPLAY_SLUG;

        const container = document.getElementById('content-container');
        const loadingDiv = document.getElementById('loading');
        const errorDiv = document.getElementById('error');
        const countdownDiv = document.getElementById('countdown');
        const progressContainer = document.getElementById('progress-container');
        const progressBarFill = document.getElementById('progress-bar-fill');
        const pageIndicator = document.getElementById('page-indicator');

        // State
        let pages = [];
        let currentPage = 0;
        let cycleInterval = 10;
        let progressIndicator = 'progress';
        let videoFit = 'contain';
        let cycleTimer = null;
        let countdownTimer = null;
        let elapsedSeconds = 0;
        let countdownSeconds = 0;
        let currentStateKey = null;

        function getStateKey(data) {
            if (data.content_type === 'pdf') return 'pdf:' + (data.pages && data.pages[0] || '');
            return (data.content_type || '') + ':' + (data.url || '');
        }

        function showError(msg) {
            loadingDiv.style.display = 'none';
            errorDiv.textContent = msg;
            errorDiv.style.display = 'block';
        }

        function clearError() {
            errorDiv.style.display = 'none';
        }

        // --- Progress indicator ---

        function updateProgress() {
            if (pages.length <= 1) {
                countdownDiv.style.display = 'none';
                progressContainer.style.display = 'none';
                return;
            }
            if (progressIndicator === 'countdown') {
                countdownDiv.textContent = countdownSeconds + 's';
                countdownDiv.style.display = 'block';
                progressContainer.style.display = 'none';
            } else if (progressIndicator === 'progress') {
                pageIndicator.textContent = 'Seite ' + (currentPage + 1) + '/' + pages.length;
                progressBarFill.style.width = ((elapsedSeconds / cycleInterval) * 100) + '%';
                countdownDiv.style.display = 'none';
                progressContainer.style.display = 'block';
            } else {
                countdownDiv.style.display = 'none';
                progressContainer.style.display = 'none';
            }
        }

        function startProgress() {
            if (countdownTimer) clearInterval(countdownTimer);
            countdownSeconds = cycleInterval;
            elapsedSeconds = 0;
            updateProgress();
            countdownTimer = setInterval(function() {
                countdownSeconds = Math.max(0, countdownSeconds - 1);
                elapsedSeconds++;
                updateProgress();
            }, 1000);
        }

        function stopProgress() {
            if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }
            countdownDiv.style.display = 'none';
            progressContainer.style.display = 'none';
        }

        // --- Page cycling (PDF only) ---

        function showPage(index) {
            container.innerHTML = '';
            if (!pages[index]) return;
            var img = document.createElement('img');
            img.src = pages[index];
            img.onload = function() { loadingDiv.style.display = 'none'; };
            container.appendChild(img);
        }

        function nextPage() {
            currentPage = (currentPage + 1) % pages.length;
            showPage(currentPage);
            countdownSeconds = cycleInterval;
            elapsedSeconds = 0;
            updateProgress();
        }

        function startCycling() {
            if (cycleTimer) clearInterval(cycleTimer);
            if (pages.length > 1) {
                cycleTimer = setInterval(nextPage, cycleInterval * 1000);
                startProgress();
            }
        }

        function stopCycling() {
            if (cycleTimer) { clearInterval(cycleTimer); cycleTimer = null; }
            stopProgress();
        }

        // --- Content rendering ---

        function renderContent(data) {
            stopCycling();
            container.innerHTML = '';
            clearError();
            loadingDiv.style.display = 'block';

            var ct = data.content_type;

            if (ct === 'pdf') {
                pages = data.pages || [];
                currentPage = 0;
                if (pages.length === 0) {
                    showError('Keine gerenderten Seiten gefunden. Bitte PDFs neu rendern.');
                    return;
                }
                showPage(0);
                if (pages.length > 1) startCycling();

            } else if (ct === 'image') {
                var img = document.createElement('img');
                img.src = data.url;
                img.onload = function() { loadingDiv.style.display = 'none'; };
                img.onerror = function() { showError('Bild konnte nicht geladen werden'); };
                container.appendChild(img);

            } else if (ct === 'video') {
                var video = document.createElement('video');
                video.src = data.url;
                video.autoplay = true;
                video.loop = true;
                video.muted = true;
                video.playsInline = true;
                video.style.objectFit = data.video_fit || 'contain';
                video.oncanplay = function() { loadingDiv.style.display = 'none'; };
                video.onerror = function() { showError('Video konnte nicht geladen werden'); };
                container.appendChild(video);

            } else if (ct === 'youtube' || ct === 'url') {
                var iframe = document.createElement('iframe');
                iframe.src = data.url;
                iframe.allow = 'autoplay; fullscreen';
                iframe.onload = function() { loadingDiv.style.display = 'none'; };
                container.appendChild(iframe);
            }
        }

        // --- Polling ---

        function poll() {
            fetch(API_URL)
                .then(function(r) {
                    if (!r.ok) throw new Error('Kein Inhalt verfügbar');
                    return r.json();
                })
                .then(function(data) {
                    document.body.style.backgroundColor = data.background_color || '#ffffff';

                    var newKey = getStateKey(data);
                    var newInterval = data.cycle_interval;
                    var newIndicator = data.progress_indicator || 'progress';

                    if (newKey !== currentStateKey) {
                        // Content changed — full reload
                        currentStateKey = newKey;
                        cycleInterval = newInterval;
                        progressIndicator = newIndicator;
                        renderContent(data);
                    } else {
                        // Same content — update settings live
                        if (newIndicator !== progressIndicator) {
                            progressIndicator = newIndicator;
                            updateProgress();
                        }
                        if (newInterval !== cycleInterval && cycleTimer) {
                            cycleInterval = newInterval;
                            startCycling();
                        }
                    }
                })
                .catch(function(err) {
                    showError('Kein Inhalt verfügbar');
                });
        }

        poll();
        setInterval(poll, 10000);
    </script>
</body>
</html>
