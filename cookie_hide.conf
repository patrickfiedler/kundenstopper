/* cookie_hide.conf — CSS selectors for cookie banner hiding.
   Injected by the proxy as a <style> block into all proxied pages.
   Add site-specific selectors at the top. Standard CSS syntax (comments included). */

/* --- Site-specific --- */
#cookie-consent,
.cookie-consent-container,

/* --- OneTrust --- */
#onetrust-banner-sdk,
#onetrust-consent-sdk,
.onetrust-pc-dark-filter,

/* --- CookieBot --- */
#CybotCookiebotDialog,
#CybotCookiebotDialogBodyUnderlay,
.CybotCookiebotFader,

/* --- Quantcast --- */
#qc-cmp2-container,

/* --- Didomi --- */
#didomi-host,
.didomi-popup-backdrop,

/* --- CookieConsent.js --- */
.cc-window,
.cc-banner,

/* --- CookieYes --- */
.cky-consent-container,
.cky-overlay,

/* --- Borlabs --- */
#BorlabsCookieBox,

/* --- TrustArc --- */
#truste-consent-track,

/* --- Iubenda --- */
#iubenda-cs-banner,

/* --- Osano --- */
.osano-cm-window,

/* --- Complianz --- */
#cmplz-cookiebanner-container,

/* --- Cookie Law Info / WPML --- */
#cookie-law-info-bar,

/* --- Termly --- */
#termly-code-snippet-support,

/* --- Generic patterns --- */
#cookie-notice,
.cookie-notice,
#cookie-banner,
.cookie-banner,
#cookiebanner,
.cookiebanner,
#cookie-overlay,
.cookie-overlay
{ display: none !important; }
